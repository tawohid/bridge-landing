<div class="absolute bottom-0 left-0 w-0 h-[1px] bg-primary group-focus-within:w-full transition-all duration-700"></div>
</div>
<button class="bg-primary text-on-primary py-5 px-10 self-start font-body font-medium tracking-wide hover:opacity-95 hover:shadow-lg transition-all duration-300 flex items-center group">

</div>
